name: 🎯 AICUT 신규 기업 자동 수집

on:
  schedule:
    - cron: '0 0 * * 1-5'   # 평일 매일 UTC 00:00 = KST 09:00
  workflow_dispatch:          # GitHub UI에서 수동 실행 가능

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🟢 Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 패키지 설치
        run: |
          cd .github/scripts
          npm install

      - name: 🔍 신규 기업 수집 및 Firebase 저장
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: node .github/scripts/collect.js

      - name: ✅ 실행 완료 시간 기록
        run: |
          echo "완료: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S KST')"
